<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rádio Mix Total Online</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:white;

    background: url("https://i.imgur.com/TvOkUPf.jpeg") no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.45);
    min-height:100vh;
    padding-top:30px;
}

h1 {
    font-size:32px;
}

/* capa */
.cover {
    width:200px;
    height:200px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 20px #000;
}

/* texto */
.title {
    font-size:22px;
    color:#00ff88;
}

.artist {
    font-size:18px;
    color:#ff4444;
}

/* botões */
button {
    background:linear-gradient(45deg, green, red);
    border:none;
    color:white;
    padding:15px 40px;
    font-size:20px;
    border-radius:30px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.1);
}

/* volume */
.volume {
    margin-top:20px;
}

/* rodapé */
.footer {
    position:fixed;
    bottom:15px;
    width:100%;
    font-size:14px;
    background:rgba(0,0,0,0.6);
    padding:6px;
}
</style>

</head>

<body>

<div class="overlay">

<h1>Rádio Mix Total Online</h1>

<img id="cover" class="cover" src="https://i.imgur.com/TvOkUPf.jpeg">

<h2 class="title" id="song">A carregar...</h2>
<h3 class="artist" id="artist"></h3>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="stopRadio()">⏹ STOP</button>

<div class="volume">
Volume:
<input type="range" min="0" max="1" step="0.01" value="0.8" onchange="setVolume(this.value)">
</div>

<audio id="radio">
    <source src="https://radio-mixtotal.ham-radio-op.net/listen/radio_mix_total/radio.mp3" type="audio/mpeg">
</audio>

<div class="footer">
© Rádio Mix Total – Todos os direitos reservados – 2026
</div>

</div>

<script>
function playRadio() {
    document.getElementById("radio").play();
}

function stopRadio() {
    document.getElementById("radio").pause();
}

function setVolume(v) {
    document.getElementById("radio").volume = v;
}

/* 🔥 UPDATE SEM CACHE (FIX TOTAL) */
function update() {
    fetch("https://api.allorigins.win/raw?url=http://141.95.7.173/api/nowplaying/1&_=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {

        document.getElementById("song").innerText = data.now_playing.song.title || "Em direto";
        document.getElementById("artist").innerText = data.now_playing.song.artist || "";

        /* capa */
        if (data.now_playing.song.art) {
            document.getElementById("cover").src = data.now_playing.song.art + "?t=" + new Date().getTime();
        } else {
            document.getElementById("cover").src = "https://i.imgur.com/TvOkUPf.jpeg";
        }

    })
    .catch(() => {
        document.getElementById("song").innerText = "Rádio Mix Total Online";
        document.getElementById("artist").innerText = "Em direto";
    });
}

/* mais rápido */
setInterval(update, 3000);
update();
</script>

</body>
</html>

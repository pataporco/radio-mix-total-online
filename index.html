<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rádio Mix Total Online</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:white;

    background: url("https://i.imgur.com/TvOkUPf.jpeg") no-repeat center center fixed;
    background-size: cover;
}

/* fundo mais leve */
.overlay {
    background: rgba(0,0,0,0.35);
    min-height:100vh;
    padding-top:30px;
}

h1 {
    font-size:30px;
}

/* capa */
.cover {
    width:180px;
    height:180px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 20px #000;
}

/* textos */
.title {
    font-size:20px;
    color:#00ff88;
}

.artist {
    font-size:16px;
    color:#ff4444;
}

/* botões */
button {
    background:linear-gradient(45deg, green, red);
    border:none;
    color:white;
    padding:15px 40px;
    font-size:18px;
    border-radius:30px;
    margin:10px;
    cursor:pointer;
}

/* volume */
.volume {
    margin-top:20px;
}

/* rodapé */
.footer {
    position:fixed;
    bottom:10px;
    width:100%;
    font-size:14px;
    background:rgba(0,0,0,0.5);
    padding:5px;
}
</style>

</head>

<body>

<div class="overlay">

<h1>Rádio Mix Total Online</h1>

<img id="cover" class="cover"
src="https://i.imgur.com/TvOkUPf.jpeg"
onerror="this.src='https://i.imgur.com/TvOkUPf.jpeg'">

<h2 class="title" id="song">A carregar...</h2>
<h3 class="artist" id="artist"></h3>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="stopRadio()">⏹ STOP</button>

<div class="volume">
🔊 Volume<br>
<input type="range" min="0" max="1" step="0.01" value="0.8"
oninput="setVolume(this.value)">
</div>

<audio id="radio" preload="none"></audio>

<div class="footer">
© Rádio Mix Total – Todos os direitos reservados – 2026
</div>

</div>

<script>
let radio = document.getElementById("radio");

/* 🔥 PLAY CORRIGIDO (TELEMÓVEL + CACHE FIX) */
function playRadio() {
    radio.src = "https://radio-mixtotal.ham-radio-op.net/listen/radio_mix_total/radio.mp3?"+Date.now();
    radio.load();

    let playPromise = radio.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            alert("👉 Toca novamente no PLAY (proteção do telemóvel)");
        });
    }
}

/* STOP */
function stopRadio() {
    radio.pause();
}

/* VOLUME */
function setVolume(v) {
    radio.volume = v;
}

/* 🔥 UPDATE SEM CACHE */
function update() {
    fetch("https://api.allorigins.win/raw?url=http://141.95.7.173/api/nowplaying/1&_=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {

        document.getElementById("song").innerText =
            data.now_playing.song.title || "Em direto";

        document.getElementById("artist").innerText =
            data.now_playing.song.artist || "";

        let cover = data.now_playing.song.art;

        /* capa melhorada */
        if (cover && cover.includes("http") && !cover.includes("default")) {
            document.getElementById("cover").src =
                cover + "?t=" + new Date().getTime();
        } else {
            document.getElementById("cover").src =
                "https://i.imgur.com/TvOkUPf.jpeg";
        }

    })
    .catch(() => {
        document.getElementById("song").innerText = "Rádio Mix Total Online";
        document.getElementById("artist").innerText = "Em direto";
    });
}

/* atualizar rápido */
setInterval(update, 3000);
update();
</script>

</body>
</html>

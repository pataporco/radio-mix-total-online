<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rádio Mix Total Online</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family: Arial;
    text-align:center;
}

h1 {
    margin-top:20px;
}

button {
    background:linear-gradient(45deg, green, red);
    border:none;
    color:white;
    padding:15px 40px;
    font-size:20px;
    border-radius:30px;
    margin:10px;
    cursor:pointer;
}

.title {
    font-size:22px;
    color:#00ff88;
}

.artist {
    font-size:18px;
    color:#ff4444;
}

/* esconder player */
#player {
    position:absolute;
    left:-9999px;
}
</style>

</head>

<body>

<h1>Rádio Mix Total Online</h1>

<h2 class="title" id="song">A carregar...</h2>
<h3 class="artist" id="artist"></h3>

<button onclick="playRadio()">▶ PLAY</button>
<button onclick="stopRadio()">⏹ STOP</button>

<!-- player escondido -->
<iframe id="player"
src="https://radio-mixtotal.ham-radio-op.net/public/radio_mix_total/embed"
width="0" height="0"></iframe>

<script>
function playRadio() {
    document.getElementById("player").src =
    "https://radio-mixtotal.ham-radio-op.net/public/radio_mix_total/embed";
}

function stopRadio() {
    document.getElementById("player").src = "";
}

function update() {
    fetch("https://api.allorigins.win/raw?url=http://141.95.7.173/api/nowplaying/1")
    .then(res => res.json())
    .then(data => {
        document.getElementById("song").innerText = data.now_playing.song.title;
        document.getElementById("artist").innerText = data.now_playing.song.artist;
    })
    .catch(() => {
        document.getElementById("song").innerText = "Rádio Mix Total Online";
        document.getElementById("artist").innerText = "Em direto";
    });
}

setInterval(update, 5000);
update();
</script>

</body>
</html>
